<!doctype html>
<html>
  <head>
    <title>hesap makinasii</title>
    <style>
      .hesap-makinesi {
        border: 1px solid black;
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        background-color: brown;
        border-radius: 10px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
      }
      #ekran {
        width: 93%;
        height: 50px;
        text-align: right;
        padding: 10px;
        margin-bottom: 20px;
        border: none;
        border-radius: 5px;
      }
      .butonlar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }
      button {
        padding: 20px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
      }
      button:hover {
        background-color: gray;
      }
      .islem {
        background-color: orange;
        color: white;
      }
      .temizle {
        background-color: red;
        color: white;
      }
      .temizle:hover {
        background-color: darksalmon;
      }
    </style>
    <body>
      <div class="hesap-makinesi">
        <input type="text" id="ekran" />
        <div class="butonlar">
          <button class="temizle" onclick="ekraniTemizle()">C</button>
          <button class="islem" onclick="tusaBas('/')">/</button>
          <button class="islem" onclick="tusaBas('*')">x</button>
          <button class="islem" onclick="tusaBas('-')">-</button>
          <!-- sayılar -->
          <button onclick="tusaBas('7')">7</button>
          <button onclick="tusaBas('8')">8</button>
          <button onclick="tusaBas('9')">9</button>
          <button class="islem" onclick="tusaBas('+')">+</button>

          <button onclick="tusaBas('4')">4</button>
          <button onclick="tusaBas('5')">5</button>
          <button onclick="tusaBas('6')">6</button>

          <button class="islem" onclick="hesapla()">=</button>

          <button onclick="tusaBas('1')">1</button>
          <button onclick="tusaBas('2')">2</button>
          <button onclick="tusaBas('3')">3</button>

          <button onclick="tusaBas('0')">0</button>

          <script>
            let ekran = document.getElementById("ekran");

            function tusaBas(deger) {
              ekran.value = ekran.value + deger;
            }
            function ekraniTemizle() {
              ekran.value = "";
            }
            function hesapla() {
              try {
                let sonuc = eval(ekran.value);
                ekran.value = sonuc;
              } catch (hata) {
                ekran.value = "hata";
              }
            }
          </script>
        </div>
      </div>
    </body>
  </head>
</html>
